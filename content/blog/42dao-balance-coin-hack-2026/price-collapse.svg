<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="monospace" font-size="12">
  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="bold">AMM Price Collapse — Constant-Product Model</text>

  <!-- Axes -->
  <line x1="80" y1="400" x2="760" y2="400" stroke="#6c7086" stroke-width="1"/>
  <line x1="80" y1="400" x2="80" y2="60" stroke="#6c7086" stroke-width="1"/>
  <text x="40" y="230" fill="#6c7086" font-size="11" transform="rotate(-90, 40, 230)">BLC price (USD)</text>
  <text x="420" y="430" text-anchor="middle" fill="#6c7086" font-size="11">BLC supply in pool</text>

  <!-- Grid -->
  <line x1="80" y1="100" x2="760" y2="100" stroke="#313244" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="80" y1="200" x2="760" y2="200" stroke="#313244" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="80" y1="300" x2="760" y2="300" stroke="#313244" stroke-width="0.5" stroke-dasharray="2,3"/>
  <text x="70" y="104" text-anchor="end" fill="#6c7086" font-size="10">$1.0</text>
  <text x="70" y="204" text-anchor="end" fill="#6c7086" font-size="10">$0.1</text>
  <text x="70" y="304" text-anchor="end" fill="#6c7086" font-size="10">$0.01</text>

  <!-- Pre-attack curve P = k/y² (hyperbola shape) -->
  <!-- We plot P(y) = P0 * (y0/y)² for y >= y0 -->
  <!-- Pre-attack: y0 = 350K, P0 = $1.00 -->
  <!-- Post-attack: y grows to ~9.5M, P drops to $0.001358 -->

  <!-- Plot the hyperbolic curve -->
  <path d="M 150,100 Q 200,100 220,110 Q 280,140 340,200 Q 400,260 460,310 Q 520,345 580,365 Q 640,378 700,388 L 740,393" 
        fill="none" stroke="#89b4fa" stroke-width="2"/>

  <!-- Pre-attack point -->
  <circle cx="150" cy="100" r="5" fill="#a6e3a1"/>
  <text x="160" y="95" fill="#a6e3a1" font-size="11">P₀ = $1.00</text>
  <text x="160" y="108" fill="#6c7086" font-size="10">y₀ ≈ 350K BLC</text>

  <!-- Mid-collapse -->
  <circle cx="340" cy="200" r="4" fill="#f9e2af"/>
  <text x="350" y="200" fill="#f9e2af" font-size="10">P = $0.10</text>

  <circle cx="460" cy="310" r="4" fill="#f9e2af"/>
  <text x="470" y="310" fill="#f9e2af" font-size="10">P = $0.01</text>

  <!-- Post-attack point -->
  <circle cx="700" cy="388" r="5" fill="#f38ba8"/>
  <text x="610" y="378" fill="#f38ba8" font-size="11" font-weight="bold">P₁ = $0.001358</text>
  <text x="610" y="392" fill="#6c7086" font-size="10">y₁ ≈ 9.5M BLC (−99.86%)</text>

  <!-- Attack arrow -->
  <path d="M 160,105 Q 400,250 690,383" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrD)"/>
  <defs>
    <marker id="arrD" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f38ba8"/>
    </marker>
  </defs>

  <!-- Formula box -->
  <rect x="120" y="145" width="260" height="50" rx="6" fill="#181825" stroke="#313244" stroke-width="1"/>
  <text x="250" y="165" text-anchor="middle" fill="#89b4fa" font-size="11">P(y) = k / y²</text>
  <text x="250" y="182" text-anchor="middle" fill="#6c7086" font-size="10">Doubling supply → price ÷ 4</text>

  <!-- USDT Pool annotation -->
  <rect x="500" y="130" width="240" height="70" rx="6" fill="#181825" stroke="#94e2d5" stroke-width="1"/>
  <text x="620" y="150" text-anchor="middle" fill="#94e2d5" font-size="11" font-weight="bold">USDT Pool: 1:1 extraction</text>
  <text x="620" y="168" text-anchor="middle" fill="#a6adc8" font-size="10">915K BLC → 915K USDT</text>
  <text x="620" y="184" text-anchor="middle" fill="#6c7086" font-size="10">before PancakeSwap feels supply shock</text>
  <text x="620" y="196" text-anchor="middle" fill="#6c7086" font-size="10">remaining ≈ 9M BLC dumped → collapse</text>
</svg>
