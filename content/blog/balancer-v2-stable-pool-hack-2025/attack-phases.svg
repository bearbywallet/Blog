<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
<rect width="960" height="560" fill="#11111b"/>
<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#a6adc8"/></marker></defs>
<text x="40" y="36" font-size="15" fill="#cba6f7" text-anchor="start" font-weight="bold">THE THREE-PHASE batchSwap  (pool 1: osETH/wETH, 121 swaps)</text>
<rect x="40" y="60" width="880" height="130" rx="8" fill="#231c2e" stroke="#cba6f7" stroke-width="2"/>
<text x="60" y="86" font-size="14" fill="#cba6f7" text-anchor="start" font-weight="bold">PHASE 1  ·  BPT-EXIT CASCADE  (swaps 0–21)</text>
<text x="60" y="110" font-size="12" fill="#cdd6f4" text-anchor="start" font-weight="normal">BPT → {WETH, osETH}, alternating, amounts ÷100 each step</text>
<text x="60" y="132" font-size="11" fill="#a6adc8" text-anchor="start" font-weight="normal">5,258 BPT→4,873 WETH · 6,472 BPT→6,783 osETH · … · 52 BPT→48 WETH · …</text>
<text x="60" y="154" font-size="12" fill="#f9e2af" text-anchor="start" font-weight="normal">geometric series  r = 0.01   →   Σ burned = 11,848 BPT</text>
<text x="60" y="174" font-size="12" fill="#a6e3a1" text-anchor="start" font-weight="bold">⟶  receives  4,922 WETH  +  6,852 osETH  (near-fair exit)</text>
<rect x="40" y="210" width="880" height="150" rx="8" fill="#1c2730" stroke="#89b4fa" stroke-width="2"/>
<text x="60" y="236" font-size="14" fill="#89b4fa" text-anchor="start" font-weight="bold">PHASE 2  ·  ROUNDING-TRIGGER PING-PONG  (swaps 22–111, 30 cycles)</text>
<text x="60" y="260" font-size="12" fill="#cdd6f4" text-anchor="start" font-weight="normal">3-swap cycle ×30:  WETH→osETH (large) · WETH→osETH (≈17–69 wei) · osETH→WETH</text>
<text x="60" y="284" font-size="12" fill="#cdd6f4" text-anchor="start" font-weight="normal">the ≈17-wei swaps drive a pool token BALANCE into the sub-100-wei regime</text>
<text x="60" y="308" font-size="12" fill="#f9e2af" text-anchor="start" font-weight="normal">where  upscale = mulDown(balance, scalingFactor)  floors  8.59 → 8</text>
<text x="60" y="330" font-size="12" fill="#f38ba8" text-anchor="start" font-weight="normal">at high amplification the invariant D becomes ill-conditioned → BPT mispriced</text>
<rect x="40" y="380" width="880" height="150" rx="8" fill="#22271f" stroke="#a6e3a1" stroke-width="2"/>
<text x="60" y="406" font-size="14" fill="#a6e3a1" text-anchor="start" font-weight="bold">PHASE 3  ·  BPT-MINT CASCADE  (swaps 112–120)</text>
<text x="60" y="430" font-size="12" fill="#cdd6f4" text-anchor="start" font-weight="normal">{WETH, osETH} → BPT, amounts ×1000 each step, BPT output = powers of 10</text>
<text x="60" y="454" font-size="11" fill="#a6adc8" text-anchor="start" font-weight="normal">732 wei WETH→BPT · 2.8e8 wei→BPT · … · 269 WETH→10,000 BPT</text>
<text x="60" y="478" font-size="12" fill="#f9e2af" text-anchor="start" font-weight="normal">BPT now ≈ 2.5% of fair value  →  mint cheaply</text>
<text x="60" y="500" font-size="12" fill="#f38ba8" text-anchor="start" font-weight="bold">⟵  mints  11,892 BPT  for only  299 WETH + 0.5 osETH</text>
<line x1="900" y1="125" x2="900" y2="210" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#ah)"/>
<line x1="900" y1="360" x2="900" y2="380" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#ah)"/>
</svg>
