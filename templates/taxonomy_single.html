<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>{{ term.name }}</title>
    </head>
    <body>
        <h1>{{ taxonomy.name }}: {{ term.name }}</h1>
        <ul>
            {% for page in term.pages %}
            <li><a href="{{ page.permalink | safe }}">{{ page.title }}</a></li>
            {% endfor %}
        </ul>
    </body>
</html>
